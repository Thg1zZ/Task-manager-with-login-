<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow — Nova Senha</title>
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' http://localhost:8080 https://task-manager-with-login.onrender.com; img-src 'self' data: blob:;">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">

    <div class="auth-bg">
        <div class="grid-overlay"></div>
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="logo">
                    <span class="logo-icon">⬡</span>
                    <span class="logo-text">TaskFlow</span>
                </div>
                <h1 class="auth-title">Nova Senha</h1>
                <p class="auth-subtitle">Crie uma nova senha para acessar sua conta</p>
            </div>

            <div id="resetAlert" class="alert hidden"></div>

            <form id="resetPasswordForm" class="auth-form" novalidate>
                <div class="field-group">
                    <label class="field-label" for="newPassword">Nova Senha</label>
                    <div class="field-wrapper">
                        <span class="field-icon">◉</span>
                        <input type="password" id="newPassword" name="newPassword"
                               class="field-input" placeholder="Mín. 6 caracteres" autocomplete="new-password">
                        <button type="button" class="toggle-password" data-target="newPassword">
                            <span id="newPasswordEye">👁</span>
                        </button>
                    </div>
                    <span class="field-error" id="newPasswordError"></span>
                </div>

                <div class="field-group">
                    <label class="field-label" for="confirmPassword">Confirmar Nova Senha</label>
                    <div class="field-wrapper">
                        <span class="field-icon">◉</span>
                        <input type="password" id="confirmPassword" name="confirmPassword"
                               class="field-input" placeholder="Repita a senha" autocomplete="new-password">
                        <button type="button" class="toggle-password" data-target="confirmPassword">
                            <span id="confirmPasswordEye">👁</span>
                        </button>
                    </div>
                    <span class="field-error" id="confirmPasswordError"></span>
                </div>

                <button type="submit" class="btn-primary" id="resetBtn">
                    <span class="btn-text">Redefinir Senha</span>
                    <span class="btn-loader hidden">⟳</span>
                </button>
            </form>
        </div>
    </div>

    <script src="js/recovery.js"></script>
</body>
</html>
