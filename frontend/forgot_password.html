<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow — Recuperar Senha</title>
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' http://localhost:8080 https://task-manager-with-login.onrender.com; img-src 'self' data: blob:;">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">

    <div class="auth-bg">
        <div class="grid-overlay"></div>
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="logo">
                    <span class="logo-icon">⬡</span>
                    <span class="logo-text">TaskFlow</span>
                </div>
                <h1 class="auth-title">Recuperar Senha</h1>
                <p class="auth-subtitle">Enviaremos um link de recuperação para o seu email</p>
            </div>

            <div id="recoveryAlert" class="alert hidden"></div>

            <form id="forgotPasswordForm" class="auth-form" novalidate>
                <div class="field-group">
                    <label class="field-label" for="recoveryEmail">Email</label>
                    <div class="field-wrapper">
                        <span class="field-icon">◈</span>
                        <input type="email" id="recoveryEmail" name="email"
                               class="field-input" placeholder="seu@email.com" autocomplete="email">
                    </div>
                    <span class="field-error" id="recoveryEmailError"></span>
                </div>

                <button type="submit" class="btn-primary" id="recoveryBtn">
                    <span class="btn-text">Enviar link</span>
                    <span class="btn-loader hidden">⟳</span>
                </button>
            </form>

            <div class="auth-divider"><span>ou</span></div>

            <p class="auth-switch">
                Lembrou a senha?
                <a href="index.html" class="link-btn" style="text-decoration:none;">Fazer login →</a>
            </p>
        </div>
    </div>

    <script src="js/recovery.js"></script>
</body>
</html>
