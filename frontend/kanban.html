<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow — Kanban</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/kanban.css">
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body class="dashboard-page">
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo"><span class="logo-icon">⬡</span><span class="logo-text">TaskFlow</span></div>
        </div>
        <nav class="sidebar-nav" id="sidebarNav"></nav>
        <div class="sidebar-footer">
            <div class="user-card">
                <div class="user-avatar" id="userAvatar">?</div>
                <div class="user-info">
                    <span class="user-name" id="userName">—</span>
                    <span class="user-email" id="userEmail">—</span>
                </div>
            </div>
            <button class="btn-logout" onclick="logout()" title="Sair">⏻</button>
        </div>
    </aside>

    <main class="main-content">
        <header class="topbar">
            <div class="topbar-left">
                <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
                <h2 class="page-title">Kanban Board</h2>
            </div>
            <div class="topbar-right">
                <button id="themeToggleBtn" class="btn-ghost" onclick="toggleTheme()" style="padding: 6px 12px; font-size: 16px;"></button>
                <button class="btn-new-task" onclick="openModal()">+ Nova Tarefa</button>
            </div>
        </header>

        <div class="kanban-wrapper">
            <div class="kanban-board" id="kanbanBoard">
                <!-- colunas geradas por JS -->
            </div>
        </div>
    </main>

    <!-- Modal reutilizado -->
    <div class="modal-overlay hidden" id="modalOverlay" onclick="closeModalOutside(event)">
        <div class="modal-card" id="modalCard">
            <div class="modal-header">
                <h3 class="modal-title" id="modalTitle">Nova Tarefa</h3>
                <button class="modal-close" onclick="closeModal()">✕</button>
            </div>
            <div id="modalAlert" class="alert hidden"></div>
            <form id="taskForm" class="modal-form" novalidate>
                <input type="hidden" id="taskId">
                <div class="field-group">
                    <label class="field-label">Título *</label>
                    <div class="field-wrapper"><input type="text" id="taskTitle" class="field-input" placeholder="Título da tarefa"></div>
                    <span class="field-error" id="taskTitleError"></span>
                </div>
                <div class="field-group">
                    <label class="field-label">Descrição</label>
                    <textarea id="taskDesc" class="field-input field-textarea" rows="3" placeholder="Detalhes..."></textarea>
                </div>
                <div class="modal-row">
                    <div class="field-group">
                        <label class="field-label">Status</label>
                        <select id="taskStatus" class="field-input field-select">
                            <option value="TODO">A Fazer</option>
                            <option value="IN_PROGRESS">Em Progresso</option>
                            <option value="DONE">Concluída</option>
                        </select>
                    </div>
                    <div class="field-group">
                        <label class="field-label">Prioridade</label>
                        <select id="taskPriority" class="field-input field-select">
                            <option value="LOW">Baixa</option>
                            <option value="MEDIUM" selected>Média</option>
                            <option value="HIGH">Alta</option>
                        </select>
                    </div>
                </div>
                <div class="field-group">
                    <label class="field-label">Categoria</label>
                    <select id="taskCategory" class="field-input field-select"><option value="">Nenhuma</option></select>
                </div>
                <div class="field-group prazo-block">
                    <span class="field-label">Prazo / vencimento</span>
                    <div class="prazo-mode-group" role="radiogroup" aria-label="Tipo de prazo">
                        <label class="prazo-mode-option"><input type="radio" name="taskPrazoMode" value="none" checked> Sem prazo</label>
                        <label class="prazo-mode-option"><input type="radio" name="taskPrazoMode" value="single"> Uma data</label>
                        <label class="prazo-mode-option"><input type="radio" name="taskPrazoMode" value="range"> Intervalo (de até)</label>
                    </div>
                    <p class="field-hint prazo-hint hidden">Ex.: <strong>05/06/2026</strong> até <strong>08/06/2026</strong> — preencha início e fim.</p>
                    <div class="modal-row prazo-dates-row hidden" id="prazoDatesRow">
                        <div class="field-group" id="taskStartDateGroup">
                            <label class="field-label" for="taskStartDate" id="taskStartDateLabel">Início (de)</label>
                            <div class="field-wrapper"><input type="date" id="taskStartDate" class="field-input"></div>
                        </div>
                        <div class="field-group" id="taskEndDateGroup">
                            <label class="field-label" for="taskEndDate" id="taskEndDateLabel">Fim (até)</label>
                            <div class="field-wrapper"><input type="date" id="taskEndDate" class="field-input"></div>
                        </div>
                    </div>
                </div>
                <div class="field-group">
                    <label class="field-label">Estimativa (minutos)</label>
                    <div class="field-wrapper"><input type="number" id="taskEstimate" class="field-input" min="1" placeholder="ex: 60"></div>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-ghost" onclick="closeModal()">Cancelar</button>
                    <button type="submit" class="btn-primary" id="saveTaskBtn">
                        <span class="btn-text">Salvar</span>
                        <span class="btn-loader hidden">⟳</span>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Delete confirm -->
    <div class="modal-overlay hidden" id="deleteOverlay" onclick="closeDeleteOutside(event)">
        <div class="modal-card modal-sm">
            <div class="modal-header">
                <h3 class="modal-title">Excluir Tarefa</h3>
                <button class="modal-close" onclick="closeDeleteModal()">✕</button>
            </div>
            <p class="delete-confirm-text">Excluir <strong id="deleteTaskName"></strong>? Ação irreversível.</p>
            <div class="modal-actions">
                <button class="btn-ghost" onclick="closeDeleteModal()">Cancelar</button>
                <button class="btn-danger" id="confirmDeleteBtn" onclick="confirmDelete()">Excluir</button>
            </div>
        </div>
    </div>

    <div id="toastContainer" class="toast-container"></div>
    <script src="js/shared.js"></script>
    <script src="js/kanban.js"></script>
</body>
</html>
