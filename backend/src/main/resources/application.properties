server.port=8080

# ─── DataSource ─────────────────────────────────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/taskmanager}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
# [A02] SSL na conexão com o banco em produção — remover sslmode=disable em prod
# spring.datasource.url=jdbc:postgresql://host:5432/db?sslmode=require

# ─── JPA / Hibernate ─────────────────────────────────────────────────────────────
# [A05] validate: verifica schema sem alterar — nunca usar update/create em produção
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:validate}
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.batch_size=20

# ─── Encoding ────────────────────────────────────────────────────────────────────
# [A05 CORREÇÃO] Garante que strings Java/Hibernate usem UTF-8
# Previne corrupção de acentos (ex: "nÃ£o" ao invés de "não")
spring.mandatory-file-encoding=UTF-8
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# ─── JWT ─────────────────────────────────────────────────────────────────────────
# [A02 / ASVS 6.4.1] Segredo obrigatório — mínimo 32 caracteres (256 bits para HS256)
# Gere com: openssl rand -base64 48
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=${JWT_EXPIRATION:86400000}

# ─── CORS ────────────────────────────────────────────────────────────────────────
# [ASVS 14.4.1] Origens explícitas — nunca wildcard quando allowCredentials=true
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5500,http://127.0.0.1:5500}

# ─── Rate limiting ───────────────────────────────────────────────────────────────
# [ASVS 2.2.1] Limites parametrizáveis — RateLimitingFilter lê estes valores
# app.ratelimit.login.max-attempts=${RATELIMIT_LOGIN_MAX:10}
# app.ratelimit.login.window-minutes=${RATELIMIT_LOGIN_WINDOW:15}
# Descomente e implemente injeção @Value no RateLimitingFilter para produção

# ─── Logging ─────────────────────────────────────────────────────────────────────
# [ASVS 7.1.1] Nível INFO — não logar dados sensíveis em produção
logging.level.com.taskmanager=INFO
logging.level.org.springframework.security=WARN
# Em produção, usar formato JSON estruturado para SIEM:
# logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ─── Mail ────────────────────────────────────────────────────────────────────────
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
# [A02] Exigir TLS na conexão SMTP em produção
spring.mail.properties.mail.smtp.starttls.required=true

app.frontend.url=${FRONTEND_URL:http://localhost:5500/frontend}

# ─── Actuator (se usado) ─────────────────────────────────────────────────────────
# [A05] Nunca expor actuator publicamente sem autenticação
# management.endpoints.web.exposure.include=health
# management.endpoint.health.show-details=never
